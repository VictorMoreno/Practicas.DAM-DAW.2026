<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista de Tareas - DOM</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f4f4;
            padding: 40px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin-bottom: 20px;
        }

        .acciones {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 16px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
        }

        .btn-add {
            background-color: #0078ff;
            color: white;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f0f0f0;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .tarea {
            cursor: pointer;
        }

        .completada {
            text-decoration: line-through;
            opacity: 0.6;
            color: green;
        }

        .btn-delete {
            background-color: crimson;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>📝 Lista de Tareas</h1>

        <div class="acciones">
            <input type="text" id="inputTarea" placeholder="Escribe una tarea..." />

            <button class="btn-add" id="btnAgregar">
                Añadir
            </button>
        </div>

        <ul id="listaTareas"></ul>
    </div>

    <script>
        // Obtener elementos del DOM
        const inputTarea = document.querySelector("#inputTarea");
        const btnAgregar = document.querySelector("#btnAgregar");
        const listaTareas = document.querySelector("#listaTareas");

        // Evento click del botón
        btnAgregar.addEventListener("click", agregarTarea);

        // Función para añadir tarea
        function agregarTarea() {

            // Obtener texto del input
            const texto = inputTarea.value.trim();

            // Validar input vacío
            if (texto === "") {
                alert("Escribe una tarea");
                return;
            }

            // Crear elemento <li>
            const li = document.createElement("li");

            // Crear texto de tarea
            const span = document.createElement("span");
            span.textContent = texto;
            span.classList.add("tarea");

            // Toggle clase completada
            span.addEventListener("click", () => {
                span.classList.toggle("completada");
            });

            // Crear botón eliminar
            const btnEliminar = document.createElement("button");
            btnEliminar.textContent = "Eliminar";
            btnEliminar.classList.add("btn-delete");

            // Evento eliminar tarea
            btnEliminar.addEventListener("click", () => {
                li.remove();
            });

            // Añadir elementos al li
            li.appendChild(span);
            li.appendChild(btnEliminar);

            // Añadir li a la lista
            listaTareas.appendChild(li);

            // Limpiar input
            inputTarea.value = "";

            // Focus automático
            inputTarea.focus();
        }
    </script>

</body>

</html>
