<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ejemplo Flexbox Semántico</title>
    <style>
        .contenedor {
            display: flex;

            flex-direction: row;

            justify-content: space-between;

            align-items: center;

            height: 100px;
            border: 2px solid black;
        }

        .item {
            width: 80px;
            height: 80px;
            background-color: steelblue;
            color: white;
        }
    </style>
</head>

<body>

    <div class="contenedor">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
    </div>

</body>

</html>
