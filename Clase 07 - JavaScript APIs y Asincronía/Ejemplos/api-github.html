<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>GitHub User API</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .container {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      width: 420px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-bottom: 10px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .card {
      margin-top: 20px;
      background: #0b1220;
      padding: 15px;
      border-radius: 10px;
      display: none;
    }

    .card img {
      width: 80px;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    .error {
      margin-top: 15px;
      color: #f87171;
      font-weight: bold;
      display: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>👤 GitHub User</h1>

    <input type="text" id="username" placeholder="Escribe un usuario de GitHub" />
    <button onclick="buscarUsuario()">Buscar</button>

    <div id="error" class="error"></div>

    <div id="card" class="card">
      <img id="avatar" />
      <h2 id="name"></h2>
      <p id="bio"></p>
      <p><strong>Repositorios:</strong> <span id="repos"></span></p>
    </div>
  </div>

  <script>
    async function buscarUsuario() {
      const username = document.getElementById("username").value.trim();
      const card = document.getElementById("card");
      const error = document.getElementById("error");

      card.style.display = "none";
      error.style.display = "none";

      if (!username) {
        error.textContent = "⚠️ Debes escribir un usuario";
        error.style.display = "block";
        return;
      }

      try {
        const response = await fetch(`https://api.github.com/users/${username}`);

        if (!response.ok) {
          throw new Error("Usuario no encontrado");
        }

        const data = await response.json();

        document.getElementById("avatar").src = data.avatar_url;
        document.getElementById("name").textContent = data.name || data.login;
        document.getElementById("bio").textContent = data.bio || "Sin bio disponible";
        document.getElementById("repos").textContent = data.public_repos;

        card.style.display = "block";

      } catch (err) {
        error.textContent = "❌ " + err.message;
        error.style.display = "block";
      }
    }
  </script>

</body>
</html>
