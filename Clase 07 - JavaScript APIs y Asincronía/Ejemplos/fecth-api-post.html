<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>POST API Demo</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .container {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .result {
      margin-top: 15px;
      background: #0b1220;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      white-space: pre-wrap;
      min-height: 60px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Crear Publicación</h1>

    <input type="text" id="title" placeholder="Título" />
    <textarea id="body" rows="4" placeholder="Contenido"></textarea>

    <button onclick="crearPublicacion()">Enviar Publicación</button>

    <div id="resultado" class="result">
      Resultado aparecerá aquí...
    </div>
  </div>

  <script>
    async function crearPublicacion() {
      const title = document.getElementById("title").value;
      const body = document.getElementById("body").value;
      const result = document.getElementById("resultado");

      result.textContent = "Enviando Publicación...";

      try {
        const response = await fetch("https://jsonplaceholder.typicode.com/posts", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            title: title,
            body: body,
            userId: 1
          })
        });

        const data = await response.json();

        result.textContent =
          "✅ Publicación creada correctamente:\n\n" +
          JSON.stringify(data, null, 2);

      } catch (error) {
        result.textContent = "Error: " + error;
      }
    }
  </script>

</body>
</html>
